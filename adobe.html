    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(0,0,0,0.3);
    }

    /* ── Fake browser bar ── */
    .fake-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 50px; background: #2b2b2b;
      z-index: 20; display: flex; align-items: center; padding: 0 16px; gap: 8px;
    }
    .fb-dot { width: 12px; height: 12px; border-radius: 50%; }
    .fb-r{background:#ff5f57;} .fb-y{background:#febc2e;} .fb-g{background:#28c840;}
    .fake-url {
      flex:1; background:#3c3c3c; border-radius:4px;
      padding:6px 14px; font-size:0.76rem; color:#bbb; margin:0 14px;
    }
    .fake-doc-bar {
      position: fixed; top: 50px; left: 0; right: 0;
      height: 38px; background: rgba(22,22,22,0.9);
      z-index: 15; display: flex; align-items: center; padding: 0 16px; gap: 20px;
    }
    .fake-doc-title { font-size:0.8rem; color:#ddd; font-weight:bold; }
    .fake-doc-btn   { font-size:0.73rem; color:#aaa; cursor:pointer; }
    .fake-doc-btn:hover { color:#fff; }

    /* ══ OUTER WRAPPER — white card ══ */
    .card-wrap {
      position: relative;
      z-index: 10;
      width: 460px;
      background: #e6e6e6;
      border-radius: 3px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.75);
      margin-top: 44px;
      /* white padding on top, left, right — red header sits inside */
      padding: 18px 18px 0 18px;
      overflow: visible;
    }

    /* ══ RED HEADER — sits inside white wrapper ══ */
    .header {
      background: linear-gradient(180deg, #c62828 0%, #8b0000 55%, #6d0000 100%);
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 16px;
      position: relative;
      border-radius: 2px 2px 0 0;
      overflow: visible;
    }

    /* LEFT: icon + text below */
    .left-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .left-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.2;
    }
    .left-label sup { font-size: 0.48rem; vertical-align: super; }

    /* RIGHT: orange box touches TOP of red header, logo inside, ADOBE below */
    .right-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* pull the orange box up so it touches the top of the red header */
      position: absolute;
      right: 16px;
      top: 0;           /* flush with top of red header */
    }

    .orange-box {
      background: linear-gradient(180deg, #e65c00 0%, #c84b00 100%);
      border-radius: 0 0 4px 4px;  /* top corners flat (flush), bottom rounded */
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .orange-box img {
      width: 30px; height: 30px;
      filter: brightness(0) invert(1);
      object-fit: contain;
    }

    .right-label {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.88);
      font-weight: bold;
      letter-spacing: 0.14em;
      text-align: center;
      margin-top: 4px;
    }

    /* ══ BODY ══ */
    .popup-body {
      background: #e6e6e6;
      padding: 30px 34px 28px;
      position: relative;
      min-height: 190px;
      border-radius: 0 0 3px 3px;
    }

    .body-title {
      font-size: 0.9rem;
      color: #222;
      text-align: center;
      margin-bottom: 20px;
    }

    .field-group { margin-bottom: 14px; }

    .popup-input {
      width: 100%;
      border: 1px solid #bbb;
      border-radius: 2px;
      padding: 10px 12px;
      font-size: 0.87rem;
      color: #222;
      background: #fff;
      outline: none;
      font-family: Arial, sans-serif;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .popup-input:focus {
      border-color: #8b0000;
      box-shadow: 0 0 0 2px rgba(139,0,0,0.1);
    }
